<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="관상용 사이버 어항 — 픽셀 아트 물고기들이 헤엄치는 작은 수족관">
<title>관상용 사이버 어항</title>
</head>
<body>

<div class="app">
  <div class="frame" id="frame">
    <div class="tankwrap">
      <canvas id="tank" width="192" height="120" aria-label="픽셀 아트 사이버 어항. 물고기들이 헤엄치는 애니메이션. 클릭하면 먹이를 줄 수 있습니다."></canvas>
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="goldchip" id="goldChip"><span id="goldAmt">0</span></div>
      <div class="fishchip" id="fishChip" title="물고기+알 / 최대 수용량">🐟 <span id="fishCnt">0/30</span></div>
      <div class="toolbar" id="toolbar">
        <div class="feedbar" id="feedbar"></div>
        <div class="menubtns">
          <button data-sheet="shop">🏪 상점</button>
          <button data-sheet="dex">📖 도감</button>
          <button data-sheet="ach">🏆 업적</button>
          <button data-sheet="log">📜 기록</button>
        </div>
      </div>
      <div class="popup hidden" id="fishPopup"></div>
      <div class="dexcard hidden" id="dexCard"></div>
      <div class="toasts" id="toasts"></div>
    </div>
    <aside class="sheet" id="sheet">
      <div class="sheet-head"><span id="sheetTitle"></span><button id="sheetClose">✕ 닫기</button></div>
      <div id="shopBody" class="sheetbody"></div>
      <div id="dexBody" class="sheetbody hidden"></div>
      <div id="achBody" class="sheetbody hidden"></div>
      <div id="logBody" class="sheetbody hidden"></div>
    </aside>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
