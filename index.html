<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="관상용 사이버 어항 — 픽셀 아트 물고기들이 헤엄치는 작은 수족관">
<title>관상용 사이버 어항</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #05070d;
    background-image: radial-gradient(ellipse 90% 60% at 50% -10%, #0a1626 0%, transparent 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .app {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
    max-width: 1180px;
  }
  .panel {
    width: 220px;
    flex: none;
    border-radius: 14px;
    background: linear-gradient(180deg, #111a30, #0a0f1a);
    border: 1px solid #1b2a45;
    padding: 10px;
    font: 12px/1.5 "SF Mono", "Menlo", "Consolas", monospace;
    color: #cfe3f5;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 86vh;
  }
  .wallet {
    font-size: 14px;
    font-weight: 700;
    color: #ffd54a;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 2px;
  }
  .wallet .amt { margin-left: auto; }
  .coin-ico {
    width: 13px;
    height: 13px;
    image-rendering: pixelated;
    vertical-align: -2px;
    margin: 0 1px;
  }
  .tabs { display: flex; gap: 6px; }
  .tabs button, .panel .btn {
    flex: 1;
    background: #0e1830;
    color: #cfe3f5;
    border: 1px solid #24406b;
    border-radius: 6px;
    font: inherit;
    padding: 5px 6px;
    cursor: pointer;
  }
  .tabs button.on, .panel .btn.on { background: #1c3a6e; border-color: #46d8ff; color: #fff; }
  .tabbody { overflow-y: auto; min-height: 0; flex: 1; }
  .hidden { display: none; }
  .sect { margin-top: 8px; color: #7fa3c8; font-size: 11px; letter-spacing: 0.08em; }
  .item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 2px;
    border-bottom: 1px dashed #16233c;
  }
  .item .nm { flex: 1; }
  .item .pr { color: #ffd54a; font-size: 11px; }
  .item button {
    background: #16305c;
    color: #dfeaff;
    border: 1px solid #2a4a78;
    border-radius: 5px;
    font: 11px "SF Mono", "Menlo", "Consolas", monospace;
    padding: 2px 7px;
    cursor: pointer;
  }
  .item button:disabled { opacity: 0.5; cursor: default; }
  #dexgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .dexcell {
    border: 1px solid #1b2a45;
    border-radius: 6px;
    padding: 6px 4px 4px;
    text-align: center;
    background: #0a1222;
  }
  .dexcell canvas { image-rendering: pixelated; width: 100%; max-width: 60px; }
  .dexcell.undisc { opacity: 0.5; }
  .dexcell .dnm { font-size: 11px; line-height: 1.3; }
  .hint { font-size: 10px; color: #7fa3c8; min-height: 14px; }
  .toasts {
    position: absolute;
    left: 8px;
    bottom: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    pointer-events: none;
    z-index: 5;
  }
  .toast {
    background: rgba(6, 12, 24, 0.85);
    border: 1px solid #24406b;
    color: #cfe3f5;
    border-radius: 6px;
    padding: 3px 8px;
    font: 11px "SF Mono", "Menlo", "Consolas", monospace;
    animation: tfade 3s forwards;
  }
  @keyframes tfade {
    0% { opacity: 0; transform: translateY(4px); }
    10% { opacity: 1; transform: none; }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
  .frame {
    flex: 1;
    min-width: 0;
    width: 100%;
    max-width: 920px;
    padding: 10px;
    border-radius: 18px;
    background: linear-gradient(180deg, #16203a, #0a0f1a);
    border: 1px solid #1b2a45;
    box-shadow:
      0 0 0 1px #000,
      0 0 60px rgba(70, 216, 255, 0.12),
      0 30px 80px rgba(0, 0, 0, 0.65);
  }
  .frame.skin-wood {
    background: linear-gradient(180deg, #7a5a34, #3a2814);
    border-color: #8a6236;
    box-shadow: 0 0 0 1px #241608, 0 30px 80px rgba(0, 0, 0, 0.65);
  }
  .frame.skin-neon {
    background: linear-gradient(180deg, #131c3a, #0a0f1a);
    border-color: #46d8ff;
    box-shadow:
      0 0 0 1px #ff6b9d,
      0 0 24px rgba(70, 216, 255, 0.55),
      0 0 60px rgba(255, 107, 157, 0.25),
      0 30px 80px rgba(0, 0, 0, 0.65);
  }
  .frame.skin-gold {
    background: linear-gradient(180deg, #b98f2a, #5c3f14);
    border-color: #ffd54a;
    box-shadow:
      0 0 0 1px #3a2a08,
      0 0 40px rgba(255, 213, 74, 0.25),
      0 30px 80px rgba(0, 0, 0, 0.65);
  }
  @media (max-width: 760px) {
    .app { flex-direction: column; align-items: stretch; }
    .panel { width: 100%; max-height: none; order: 2; }
  }
  .tankwrap {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    background: #04101e;
  }
  canvas {
    display: block;
    width: 100%;
    image-rendering: pixelated;
    cursor: crosshair;
  }
  .name-tag {
    position: absolute;
    transform: translate(-50%, -100%);
    font: 600 12px/1.4 "SF Mono", "Menlo", "Consolas", monospace;
    letter-spacing: 0.06em;
    color: #f0f7ff;
    pointer-events: none;
    white-space: nowrap;
    text-shadow:
      1px 0 0 #04101e, -1px 0 0 #04101e, 0 1px 0 #04101e, 0 -1px 0 #04101e,
      0 2px 6px rgba(0, 0, 0, 0.9);
  }
  .name-input {
    position: absolute;
    transform: translate(-50%, -100%);
    width: 96px;
    font: 12px "SF Mono", "Menlo", "Consolas", monospace;
    background: #0a1424;
    color: #e8f2fa;
    border: 1px solid #2a4a78;
    border-radius: 4px;
    padding: 3px 6px;
    outline: none;
  }
  .scanlines {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.14) 2px, rgba(0,0,0,0.14) 3px);
    mix-blend-mode: multiply;
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 120% 100% at 50% 45%, transparent 55%, rgba(2,6,12,0.55) 100%);
  }
</style>
</head>
<body>

<div class="app">
  <aside class="panel">
    <div class="wallet" id="wallet">골드 <span class="amt" id="goldAmt">0</span></div>

      <button id="tabShop" class="on">상점</button>

      <canvas id="tank" width="192" height="120" aria-label="픽셀 아트 사이버 어항. 물고기들이 헤엄치는 애니메이션. 클릭하면 먹이를 줄 수 있습니다."></canvas>

<script>
(() => {
"use strict";
const W = 192, H = 120, SAND_Y = 108;
const cv = document.getElementById("tank");
const cx = cv.getContext("2d");
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

// ---------- palette ----------
const FISH_PALETTES = [

  { b: "#f06ee6", d: "#b03aa8", f: "#7ae6ff" },  // magenta, cyan fin

const MIN_FISH = 7; // minimum non-crab population
const NAMES = ["node","vim","rustc","gcc","cargo","docker","tmux","zsh","git","deno","curl","grep","nvim","make","ssh","jq"];

// ---------- sprites (facing right, tail = f on left) ----------
const SPRITES = {

    "f.bbbbbbbbb..",
    "fdbbbbbbbbbd.",
    "f.bbbbbbbbb..",
    ".d.bbbbbbb.d.",

    "..d.bbbbb.d..",

  ],

    "....bb..",

    ".bbb....",
    "..bb..b.",
    "...bbb..",
  ],
  whale: [
    "f.....bbbbbbbbbb......",
    "ff..bbbbbbbbbbbbbb....",
    ".ffbbbbbbbbbbbbbbbbb..",
    ".fbbbbbbbbbbbbbbbbebb.",
    "ffbbbbbbbbbbbbbbbbbbbb",
    ".fbbbbbbbbbbbbbbbbbbb.",
    "..bbbbbbbbbbbbbbbbbb..",
    "...dddddddddddddd.....",
    "....d..d..d..d........",
  ],
};
const JELLY_FRAMES = [
  [
    "..bbbbb..",
    ".bbbbbbb.",
    ".bebbbeb.",
    ".bbbbbbb.",
    "..f.f.f..",
    "..f.f.f..",
    ".f..f..f.",
  ],
  [

    ".bebbbeb.",
    ".bbbbbbb.",

    ".f..f..f.",

];
const CRAB_FRAMES = [
  [
    ".e.......e.",

    "f.bbbbbbb.f",

    "..d..d..d..",
  ],
  [

    ".bbbbbbbbb.",
    "f.bbbbbbb.f",
    ".f.b.b.b.f.",
    ".d..d..d...",
  ],
];
const SHARK_SPRITE = [
  "..........dd..............",
  ".........dddd.............",
  "d.......bbbbbbbb..........",
  "dd....bbbbbbbbbbbbb.......",
  "ddd.bbbbbbbbbbbbbbbbbeb...",
  "ddbbbbbbbbbbbbbbbbbbbbbbww",
  "ddd.bbbbbbbbbbbbbbbbbbb...",
  "dd....bbbbbbbbbbbbbb......",
  "d.......bbbdd.............",
  "...........dd.............",
];
const SHARK_PAL = { b: "#5a7186", d: "#3c4f61", f: "#3c4f61" };
const MANTIS_SPRITE = [
  "...........e..e.",
  "...........b..b.",
  "....bbbbbbbbbb..",
  "..bbbdbbdbbdbbb.",
  ".bbbbdbbdbbdbbc.",
  "dbbbbbbbbbbbbff.",
  "db...b.b.b..fff.",
  ".d..........ff..",
  "............f...",
];
const MANTIS_PAL = { b: "#2fbf68", d: "#1e9e86", f: "#ff5c5c" };

// species table: weight + fixed identity for specials
const SPECIES_DEF = [
  { key: "tetra",  w: 22 },
  { key: "guppy",  w: 22 },
  { key: "angel",  w: 16 },
  { key: "puffer", w: 14, name: "puffy",    pal: { b: "#c8b45a", d: "#8a7a2e", f: "#e0d07a" } },
  { key: "jelly",  w: 10, name: "jellyfin", pal: { b: "#b18cff", d: "#7a5cc4", f: "#8fb8ff" } },
  { key: "crab",   w: 8,  name: "ferris",   pal: { b: "#ff7043", d: "#c24a20", f: "#ff9a70" } },
  { key: "whale",  w: 5,  name: "moby",     pal: { b: "#5f8fd4", d: "#3a5e96", f: "#7fb0ea" } },
  { key: "golden", w: 4,  name: "sudo",     pal: { b: "#ffd54a", d: "#c79a1e", f: "#ffe89a" } },
  { key: "starfish", w: 5, name: "star",    pal: { b: "#ff8a5c", d: "#c25a30", f: "#ff8a5c" } },
  { key: "seahorse", w: 6, name: "pony" },
];

// ---------- world state ----------
const fishes = [], bubbles = [], flakes = [], coins = [], eggs = [], hearts = [], rings = [];
const LOVE_AT = 3; // meals before a fish trusts you enough to be named
let t = 0, spawnedPids = new Set();
let shark = null, sharkTimer = rnd(45000, 90000);
let night = false;
// shark raid boss event
let raid = null, raidTimer = rnd(60000, 120000), raidDark = 0;
const RAID_WARN_MS = 13000, BOSS_HP = 15;
const WOUND_SPOTS = [[8,4],[12,5],[16,3],[10,6],[14,4],[18,5],[7,5],[20,4],[11,3],[15,6],[9,4],[17,4],[13,3],[19,5],[6,4]];
let breedT = rnd(20000, 40000);
let driftT = rnd(90000, 180000);
const CHEST = { x: 146, y: SAND_Y - 9, w: 13, h: 9, openT: 0, cooldown: 0 };
// bottom-left jail: three stacked treadmill cells; drag a fish in to lock it up
const JAIL = { x: 2, w: 25, top: SAND_Y - 30, h: 30, right: 27 };
JAIL.slots = [null, null, null]; // one prisoner per treadmill level
const MANTIS = { cool: 0, show: 0, dir: 1 };
const SAND_DWELLERS = ["crab", "starfish"];

function rnd(a, b) { return a + Math.random() * (b - a); }
function ri(a, b) { return Math.floor(rnd(a, b + 1)); }

function pickSpecies() {
  const total = SPECIES_DEF.reduce((s, d) => s + d.w, 0);
  let roll = Math.random() * total;
  for (const d of SPECIES_DEF) { roll -= d.w; if (roll <= 0) return d; }
  return SPECIES_DEF[0];
}

function makeFish(forceKey) {
  const def = forceKey ? SPECIES_DEF.find(d => d.key === forceKey) : pickSpecies();
  const palIdx = def.pal ? -1 : ri(0, FISH_PALETTES.length - 1);
  const pal = def.pal || FISH_PALETTES[palIdx];
  let pid; do { pid = ri(100, 9999); } while (spawnedPids.has(pid));
  spawnedPids.add(pid);
  const f = {
    species: def.key, pal, palIdx,
    name: def.name || NAMES[ri(0, NAMES.length - 1)],
    pid,
    x: rnd(20, W - 20),
    y: rnd(16, SAND_Y - 24),
    dir: Math.random() < 0.5 ? 1 : -1,
    vx: 0,
    speed: def.key === "whale" ? rnd(0.105, 0.165) : rnd(0.27, 0.51),
    targetY: 0,
    phase: rnd(0, Math.PI * 2),
    retarget: 0,
    food: null,
    foodCd: 0,
    ate: 0,
    inflated: false,
    puffT: rnd(8000, 20000),
    knock: 0, kvx: 0, kvy: 0,
    tx: rnd(20, W - 20),
    burstT: rnd(0, 2000), thrust: 1, scurry: 0,
    aggro: false, aggroT: 0, aggroY: 0,
    jail: null, dragged: false,
  };
  if (def.key === "crab") { f.y = SAND_Y - 4; f.speed = rnd(0.075, 0.135); }
  if (def.key === "jelly") { f.speed = rnd(0.02, 0.05); }
  if (def.key === "starfish") { f.y = SAND_Y - 3; f.speed = rnd(0.008, 0.018); }
  if (def.key === "seahorse") { f.speed = rnd(0.03, 0.06); }
  return f;
}

// sand dither pattern (fixed noise)
const sandNoise = [];
for (let y = 0; y < H - SAND_Y; y++) {
  sandNoise.push(Array.from({ length: W }, () => Math.random()));
}
// ---------- plants ----------
const KELP_DAY = ["#136e3a", "#22b35c", "#3dff8b"];
const KELP_NIGHT = ["#0b4426", "#14733c", "#25b45f"];
const BUSH_DAY = ["#0e6b35", "#179447", "#27c46a"];
const BUSH_NIGHT = ["#093f21", "#0f5c2e", "#177a41"];
const GLOW_CYCLE = ["#46d8ff", "#ff6b9d", "#3dff8b", "#ffd54a"];

function makePlant(type, x, h, front) {
  const p = { type, x, h, front, ph: rnd(0, 6.28) };
  if (type === "grass") {
    p.blades = Array.from({ length: ri(3, 5) }, (_, i) => ({
      dx: i - 2 + ri(0, 1), h: ri(6, 13), ph: rnd(0, 6.28),
    }));
  }
  if (type === "bush") {
    p.pix = [];
    const rx = ri(3, 5), ry = ri(4, 6);
    for (let dy = -ry; dy <= 0; dy++) {
      for (let dx = -rx; dx <= rx; dx++) {
        if ((dx / rx) ** 2 + ((dy + ry * 0.2) / ry) ** 2 < 1 && Math.random() > 0.22) {
          p.pix.push([dx, dy - ry, ri(0, 2)]);
        }
      }
    }
    p.ry = ry;
  }
  if (type === "coral") {
    p.pix = []; p.polyps = [];
    const strands = ri(3, 4);
    for (let s = 0; s < strands; s++) {
      let dx = 0, drift = (s - (strands - 1) / 2) * 0.55;
      const len = ri(7, 12);
      for (let i = 0; i < len; i++) {
        dx += drift * 0.35 + rnd(-0.3, 0.3);
        p.pix.push([Math.round(dx), -1 - i, i > len - 3 ? 1 : 0]);
      }
      p.polyps.push([Math.round(dx), -len, rnd(0, 6.28)]);
    }
  }
  if (type === "fiber") {
    const n = ri(3, 5);
    p.strands = Array.from({ length: n }, (_, i) => ({
      spread: (i - (n - 1) / 2) * 0.5,
      len: ri(Math.max(8, h - 8), h),
      ci: ri(0, GLOW_CYCLE.length - 1),
      ph: rnd(0, 6.28),
    }));
  }
  return p;
}

const plants = [
  ["kelp", 46, 38, false], ["grass", 64, 0, false], ["bush", 38, 0, false],
  ["coral", 58, 0, false], ["kelp", 71, 30, false], ["fiber", 112, 26, false],
  ["grass", 124, 0, false], ["kelp", 138, 36, false], ["bush", 168, 0, false],
  ["grass", 182, 0, false],
  ["grass", 104, 0, true], ["fiber", 50, 20, true], ["kelp", 163, 22, true], ["grass", 176, 0, true],
].map(([ty, x, h, fr]) => makePlant(ty, x, h, fr));

// ---------- log ----------
function log() {}

// ---------- economy / shop / dex ----------
const CAP = 15; // tank capacity (fish + pending eggs)
const SAVE_KEY = "cyber-fish-tank-save";
let save = { gold: 0, frames: [], frame: "", decos: [], dex: {} };
try {
  const s = JSON.parse(localStorage.getItem(SAVE_KEY));
  if (s && typeof s === "object") save = Object.assign(save, s);
} catch (e) {}
if (!Array.isArray(save.decos)) save.decos = [];
if (!Array.isArray(save.frames)) save.frames = [];
if (typeof save.dex !== "object" || !save.dex) save.dex = {};
let saveT = 0;
function snapshotTank() {
  save.fish = fishes.map(f => ({
    s: f.species, p: f.palIdx, n: f.name, c: f.customName || "",
    a: f.ate, x: Math.round(f.x), y: Math.round(f.y),
  }));
  save.eggs = eggs.map(e => ({
    s: e.species, p: e.palIdx == null ? -1 : e.palIdx,
    h: Math.round(e.hatch), x: Math.round(e.x), y: Math.round(e.y),
  }));
}
function persistNow() {
  clearTimeout(saveT);
  snapshotTank();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (e) {}
}
function persist() {
  clearTimeout(saveT);
  saveT = setTimeout(persistNow, 400);

let coinURL = null;
function coinImg(size) {
  if (!coinURL) {
    const c = document.createElement("canvas");
    c.width = 7; c.height = 7;
    const g = c.getContext("2d");
    for (let r = 0; r < 7; r++) {
      for (let col = 0; col < 7; col++) {
        const ch = COIN_ROWS[r][col];
        if (ch === ".") continue;
        g.fillStyle = COIN_COLORS[ch];
        g.fillRect(col, r, 1, 1);
      }
    }
    coinURL = c.toDataURL();
  }
  const img = document.createElement("img");
  img.src = coinURL;
  img.className = "coin-ico";
  img.alt = "골드";
  if (size) img.style.width = img.style.height = size + "px";
  return img;
}

function toast(msg) {
  const d = document.createElement("div");

    d.append(p);
    if (i < parts.length - 1) d.appendChild(coinImg(11));
  });

function discover(species, palIdx) {
  const list = save.dex[species] || (save.dex[species] = []);
  const isNewSpecies = list.length === 0;
  const idx = palIdx == null ? -1 : palIdx;
  if (list.includes(idx)) return;
  list.push(idx);
  if (isNewSpecies) { addGold(30); toast(`도감 등록: ${KOR[species]} +30🪙`); }
  else if (VARIED.includes(species)) { addGold(5); toast(`새 색상 발견: ${KOR[species]} +5🪙`); }
  persist();
  renderDex();
}

}

// click command: early mantis punch at extended range
function mantisSortie() {
  const b = raid.boss;
  if (b.mcd <= 0 && Math.abs(b.x - (CHEST.x + 6)) < 36 && b.y > 40) {
    MANTIS.dir = b.x >= CHEST.x + 6 ? 1 : -1;
    MANTIS.show = 1100;
    CHEST.openT = Math.max(CHEST.openT, 1100);
    b.kvx = MANTIS.dir * 2.2;
    b.ty = Math.max(24, b.y - 18);
    b.mcd = 4200;
    bossHit(3);
  } else {
    CHEST.openT = Math.max(CHEST.openT, 300); // lid rattles: on cooldown or out of reach
  }
}

function bossHit(dmg) {
  const b = raid.boss;
  b.hp -= dmg;
  for (let k = 0; k < 4 + dmg * 2; k++) {
    bubbles.push({ x: b.x + rnd(-9, 9), y: b.y + rnd(-6, 6), r: Math.random() < 0.5 ? 1 : 2, ph: rnd(0, 6) });
  }
  if (b.hp <= 0) raidWin();
}

function endPass(b) {
  b.passes++;
  b.ty = rnd(30, 66);
  if (b.passes >= 6) raidFail();
}

function raidWin() {
  const b = raid.boss;
  raid.phase = "flee";
  b.dir = b.x < W / 2 ? -1 : 1;
  // coin rain
  for (let k = 0; k < 16; k++) {
    coins.push({ x: rnd(12, W - 12), y: rnd(-14, 0), vy: rnd(0.05, 0.2), life: rnd(1600, 2800) });
  }
  // one rare egg drifts down
  const rare = Math.random() < 0.35;
  const sp = rare ? "golden" : ["tetra", "guppy", "angel", "seahorse"][ri(0, 3)];
  const pi = rare ? -1 : ri(0, FISH_PALETTES.length - 1);
  eggs.push({
    x: rnd(40, 150), y: 26, hatch: rnd(20000, 32000), species: sp,
    pal: rare ? SPECIES_DEF.find(d => d.key === "golden").pal : FISH_PALETTES[pi],
    palIdx: pi,
  });
  addGold(30); // raid victory bounty
  // the whole tank celebrates
  for (const f of fishes) {
    hearts.push({ x: f.x, y: f.y - 5, life: rnd(900, 1600) });
    f.ate++;
  }
}

function raidFail() {
  const b = raid.boss;
  let victim = null, bd = 1e9;
  for (const f of fishes) {
    if (SAND_DWELLERS.includes(f.species) || f.species === "jelly" || f.inflated || f.jail || f.dragged) continue;
    const d = Math.hypot(f.x - b.x, f.y - b.y);
    if (d < bd) { bd = d; victim = f; }
  }
  if (victim) {
    dropFood(victim);
    fishes.splice(fishes.indexOf(victim), 1);
    for (let k = 0; k < 10; k++) {
      bubbles.push({ x: victim.x + rnd(-4, 4), y: victim.y + rnd(-3, 3), r: Math.random() < 0.5 ? 1 : 2, ph: rnd(0, 6) });
    }
    if (nonCrabCount() < MIN_FISH) {
      setTimeout(() => {
        if (nonCrabCount() >= MIN_FISH) return;
        let nf; do { nf = makeFish(); } while (nf.species === "crab");
        addFish(nf);
      }, 8000);
    }
  }
  raid.phase = "flee";
  b.dir = b.x < W / 2 ? -1 : 1;
}

function updateBoss(dt) {
  const b = raid.boss;
  b.hitCd -= dt; b.mcd -= dt; b.jcd -= dt; b.scd -= dt; b.bitCd -= dt;
  if (b.stun > 0) {
    b.stun -= dt;
  } else {
    const slow = 0.6 + (b.hp / BOSS_HP) * 0.4; // wounded boss swims slower
    b.x += (b.dir * 0.5 * slow + b.kvx) * dt * 0.06;
    b.kvx *= 1 - 0.002 * dt;
    b.y += ((b.ty - b.y) * 0.0005 + Math.sin(t * 0.004) * 0.01) * dt * 0.6;
    b.y = Math.max(22, Math.min(SAND_Y - 26, b.y));
  }
  if (b.x < 16 && b.dir === -1) { b.x = 16; b.dir = 1; endPass(b); }
  if (b.x > W - 16 && b.dir === 1) { b.x = W - 16; b.dir = -1; endPass(b); }
  if (!raid || raid.phase !== "fight") return;

  // bite: shoves a fish aside (stun + ragdoll, no kill mid-fight)
  if (b.bitCd <= 0) {
    const mx = b.x + b.dir * 14;
    for (const f of fishes) {
      if (SAND_DWELLERS.includes(f.species) || f.knock > 0 || f.jail || f.dragged) continue;
      if (Math.abs(f.x - mx) < 9 && Math.abs(f.y - b.y) < 8) {
        f.knock = 2600;
        f.kvx = (f.x >= b.x ? 1 : -1) * rnd(1.6, 2.4);
        f.kvy = rnd(-1.6, -0.6);
        dropFood(f);
        b.bitCd = 1800;
        break;
      }
    }
  }
  // inflated puffer = spike trap
  if (b.hitCd <= 0) {
    for (const f of fishes) {
      if (f.species !== "puffer" || !f.inflated) continue;
      if (Math.abs(f.x - b.x) < 16 && Math.abs(f.y - b.y) < 10) {
        bossHit(2);
        if (!raid || raid.phase !== "fight") return;
        b.dir *= -1;
        b.kvx = (b.x < f.x ? -1 : 1) * 1.6;
        b.hitCd = 1400;
        break;
      }
    }
  }
  // jelly sting paralyzes
  if (b.jcd <= 0) {
    for (const f of fishes) {
      if (f.species !== "jelly") continue;
      if (Math.abs(f.x - b.x) < 10 && Math.abs(f.y - b.y) < 8) { b.stun = 1000; b.jcd = 5000; break; }
    }
  }
  // mantis turret guards its chest
  if (b.mcd <= 0 && Math.abs(b.x - (CHEST.x + 6)) < 24 && b.y > 52) {
    MANTIS.dir = b.x >= CHEST.x + 6 ? 1 : -1;
    MANTIS.show = 1100;
    CHEST.openT = Math.max(CHEST.openT, 1100);
    b.kvx = MANTIS.dir * 2.2;
    b.ty = Math.max(24, b.y - 18);
    b.mcd = 4200;
    bossHit(3);
    if (!raid || raid.phase !== "fight") return;
  }
  // school ram: brave cluster charges together
  if (b.scd <= 0) {
    const braves = fishes.filter(f =>
      !SAND_DWELLERS.includes(f.species) && f.species !== "jelly" && f.knock <= 0 &&
      !f.jail && !f.dragged && Math.hypot(f.x - b.x, f.y - b.y) < 42);
    if (braves.length >= 4) {
      for (const f of braves) {
        f.dir = f.x < b.x ? 1 : -1;
        f.thrust = 2.2;
        f.burstT = rnd(400, 900);
      }
      bossHit(1);
    }
    b.scd = 2600;
  }
}

function openChest() {
  if (CHEST.cooldown > 0) { log("chest: locked (retry after cooldown)", "warn"); return; }
  CHEST.openT = 3000;
  CHEST.cooldown = 12000;
  const loot = ri(3, 9);
  for (let i = 0; i < loot; i++) {
    coins.push({ x: CHEST.x + 6 + rnd(-3, 3), y: CHEST.y, vy: -rnd(0.15, 0.35), life: rnd(600, 1100) });
  }
  for (let i = 0; i < 5; i++) bubbles.push({ x: CHEST.x + 6 + rnd(-4, 4), y: CHEST.y, r: 1, ph: rnd(0, 6) });
  log(`loot: ${loot} gold coins (unused variables)`, "ok");
}

// ---------- naming (affection) ----------
const wrap = document.querySelector(".tankwrap");
let nameInput = null;
function openNameInput(f) {
  if (nameInput) nameInput.remove();
  const inp = document.createElement("input");
  inp.className = "name-input";
  inp.maxLength = 12;
  inp.value = f.customName || "";
  inp.placeholder = "이름 지어주기";
  const r = cv.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
  inp.style.left = (f.x / W * r.width + (r.left - wr.left)) + "px";
  inp.style.top = (f.y / H * r.height + (r.top - wr.top) - 10) + "px";
  wrap.appendChild(inp);
  nameInput = inp;
  inp.focus();
  let done = false;
  const close = (commit) => {
    if (done) return;
    done = true;
    if (commit && inp.value.trim()) {
      f.customName = inp.value.trim();
      hearts.push({ x: f.x, y: f.y - 6, life: 1400 });
    }
    inp.remove();
    if (nameInput === inp) nameInput = null;
  };
  inp.addEventListener("keydown", (ev) => {
    ev.stopPropagation();
    if (ev.key === "Enter") close(true);
    if (ev.key === "Escape") close(false);
  });
  inp.addEventListener("blur", () => close(true));
}

const nameTags = new Map();
function updateNameTags() {
  const r = cv.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
  const seen = new Set();
  for (const f of fishes) {
    if (!f.customName) continue;
    seen.add(f);
    let tag = nameTags.get(f);
    if (!tag) {
      const el = document.createElement("div");
      el.className = "name-tag";
      wrap.appendChild(el);
      tag = { el, x: f.x, y: f.y };
      nameTags.set(f, tag);
    }
    // drift lazily after the fish, like text floating in water
    tag.x += (f.x - tag.x) * 0.06;
    tag.y += (f.y - tag.y) * 0.06;
    tag.el.textContent = f.customName;
    tag.el.style.left = (tag.x / W * r.width + (r.left - wr.left)) + "px";
    tag.el.style.top = (tag.y / H * r.height + (r.top - wr.top) - 8) + "px";
  }
  for (const [f, tag] of nameTags) {
    if (!seen.has(f)) { tag.el.remove(); nameTags.delete(f); }
  }
}

// ---------- drag & jail ----------
function toLogical(e) {
  const r = cv.getBoundingClientRect();
  return { mx: (e.clientX - r.left) / r.width * W, my: (e.clientY - r.top) / r.height * H };
}

function imprison(f) {
  if (f.species === "whale") return false; // doesn't fit through the door
  const slot = JAIL.slots.findIndex(s => s === null);
  if (slot === -1) return false; // jail full
  JAIL.slots[slot] = f;
  f.jail = { slot, total: 0, sentence: 0 };
  f.jail.total = f.jail.sentence = rnd(9000, 13000);
  f.knock = 0;
  dropFood(f);
  return true;
}

let dragFish = null, dragDeco = null, dragMoved = 0, suppressClick = false;
cv.addEventListener("mousedown", (e) => {
  const { mx, my } = toLogical(e);
  let best = null, bd = 8;
  for (const f of fishes) {
    if (f.jail) continue;
    const d = Math.hypot(f.x - mx, f.y - my);
    if (d < bd) { bd = d; best = f; }
  }
  if (best) {
    dragFish = best;
    best.dragged = true;
    best.knock = 0;
    dragMoved = 0;
    dropFood(best);
    return;
  }
  // no fish grabbed: maybe a decoration
  for (const d of save.decos) {
    const sp = DECO_SPRITES[d.type];
    if (!sp) continue;
    const w2 = sp.rows[0].length / 2, h = sp.rows.length;
    if (Math.abs(mx - d.x) < w2 + 2 && my > SAND_Y - h - 3 && my < SAND_Y + 4) {
      dragDeco = d;
      dragMoved = 0;
      break;
    }
  }
});
cv.addEventListener("mousemove", (e) => {
  if (dragDeco) {
    const { mx } = toLogical(e);
    dragMoved += Math.abs(mx - dragDeco.x);
    dragDeco.x = Math.max(JAIL.right + 8, Math.min(W - 8, mx));
    return;
  }
  if (!dragFish) return;
  const { mx, my } = toLogical(e);
  dragMoved += Math.abs(mx - dragFish.x) + Math.abs(my - dragFish.y);
  dragFish.x = Math.max(4, Math.min(W - 4, mx));
  dragFish.y = Math.max(6, Math.min(SAND_Y - 3, my));
});
function endDrag(e) {
  if (dragDeco) {
    if (dragMoved > 3) suppressClick = true;
    dragDeco = null;
    persist();
    return;
  }
  if (!dragFish) return;
  const f = dragFish;
  dragFish = null;
  f.dragged = false;
  if (dragMoved > 5) suppressClick = true;
  const inJail = f.x < JAIL.right + 3 && f.y > JAIL.top - 4;
  if (inJail && imprison(f)) {
    for (let k = 0; k < 4; k++) bubbles.push({ x: f.x, y: f.y, r: 1, ph: rnd(0, 6) });
    return;
  }
  // released (or jail full/whale): little splash, swims off
  f.knock = 500;
  f.kvx = rnd(-0.6, 0.6) + (inJail ? 1.2 : 0); // bounced off a full jail
  f.kvy = rnd(-0.4, 0.2);
  for (let k = 0; k < 3; k++) bubbles.push({ x: f.x, y: f.y, r: 1, ph: rnd(0, 6) });
}
cv.addEventListener("mouseup", endDrag);
cv.addEventListener("mouseleave", endDrag);

cv.addEventListener("click", (e) => {
  if (suppressClick) { suppressClick = false; return; }
  const r = cv.getBoundingClientRect();
  const mx = (e.clientX - r.left) / r.width * W;
  const my = (e.clientY - r.top) / r.height * H;
  // sell mode: click a fish to sell
  if (sellMode) {
    let pick = null, pd = 9;
    for (const f of fishes) {
      if (f.jail || f.dragged) continue;
      const d = Math.hypot(f.x - mx, f.y - my);
      if (d < pd) { pd = d; pick = f; }
    }
    if (pick) sellFish(pick);
    return;
  }
  // during a raid fight, clicks are battle commands
  if (raid && raid.phase === "fight") {
    const b = raid.boss;
    if (mx >= CHEST.x - 2 && mx <= CHEST.x + CHEST.w + 2 && my >= CHEST.y - 3 && my <= CHEST.y + CHEST.h + 2) {
      mantisSortie();
      return;
    }
    if (Math.hypot(mx - b.x, my - b.y) < 60) {
      if (raid.rallyCd <= 0) rallyStrike(mx, my);
      return;
    }
    raid.retreat = 2000; // far click: scatter, dodge the next bite
    rings.push({ x: mx, y: my, r: 2, life: 600, col: "#e8f2fa" });
    return;
  }
  if (mx >= CHEST.x - 2 && mx <= CHEST.x + CHEST.w + 2 && my >= CHEST.y - 3 && my <= CHEST.y + CHEST.h + 2) {
    openChest();
    return;
  }
  // clicking a well-fed fish opens naming instead of feeding
  let best = null, bd = 8;
  for (const f of fishes) {
    const d = Math.hypot(f.x - mx, f.y - my);
    if (d < bd) { bd = d; best = f; }
  }
  if (best && best.ate >= LOVE_AT) { openNameInput(best); return; }
  feed(mx);
});


// ---------- drawing ----------
function px(x, y, c) { cx.fillStyle = c; cx.fillRect(x | 0, y | 0, 1, 1); }

const WATER_BANDS = ["#10233c", "#0d1d33", "#0a172a", "#081222", "#060d1a"];
const NIGHT_BANDS = ["#0a1228", "#08101f", "#060b18", "#040812", "#03050c"];
function drawWater() {
  const bands = night ? NIGHT_BANDS : WATER_BANDS;
  const bandH = SAND_Y / bands.length;
  for (let i = 0; i < bands.length; i++) {
    cx.fillStyle = bands[i];
    cx.fillRect(0, i * bandH | 0, W, Math.ceil(bandH) + 1);
  }
  // dither band seams
  cx.fillStyle = night ? "rgba(140,160,255,0.04)" : "rgba(70,216,255,0.05)";
  for (let i = 1; i < bands.length; i++) {
    const y = (i * bandH) | 0;
    for (let x = (i % 2); x < W; x += 2) cx.fillRect(x, y, 1, 1);
  }
  // surface shimmer
  cx.fillStyle = night ? "#12213d" : "#1e3d63";
  for (let x = 0; x < W; x += 2) {
    const o = Math.sin(t * 0.03 + x * 0.4) > 0.2 ? 0 : 1;
    cx.fillRect(x, o, 2, 1);
  }
  if (night) {
    // single moonbeam
    cx.fillStyle = "rgba(180,200,255,0.05)";
    const rx = 96 + Math.sin(t * 0.002) * 10;
    cx.fillRect(rx | 0, 2, 10, SAND_Y - 2);
    // plankton glow specks
    cx.fillStyle = "rgba(120,255,190,0.5)";
    for (let i = 0; i < 8; i++) {
      const gx = (i * 53 + Math.floor(t * 0.006) * (i + 3)) % W;
      const gy = 10 + (i * 37) % (SAND_Y - 24);
      if (Math.floor(t * 0.004 + i) % 3 === 0) cx.fillRect(gx, gy, 1, 1);
    }
  } else {
    // light rays
    cx.fillStyle = "rgba(120,210,255,0.045)";
    for (let i = 0; i < 3; i++) {
      const rx = 30 + i * 58 + Math.sin(t * 0.004 + i * 2) * 6;
      cx.fillRect(rx | 0, 2, 7, SAND_Y - 2);
    }
  }
}

function drawSand() {
  for (let y = SAND_Y; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const n = sandNoise[y - SAND_Y][x];
      px(x, y, n < 0.12 ? "#3a4d63" : n < 0.55 ? "#233246" : "#1b2839");
    }
  }
}

const SWAY = () => (reduced ? 0.3 : 1);

function drawKelp(p) {
  const shades = night ? KELP_NIGHT : KELP_DAY;
  for (let i = 0; i < p.h; i++) {
    const y = SAND_Y - 1 - i;
    const fr = i / p.h;
    const off = Math.round(Math.sin(t * 0.016 + p.ph + i * 0.2) * SWAY() * fr * 3);
    const col = fr > 0.78 ? shades[2] : fr > 0.42 ? shades[1] : shades[0];
    px(p.x + off, y, col);
    // alternating leaves
    if (i % 4 === 2 && i < p.h - 2) {
      const side = (i % 8 < 4) ? 1 : -1;
      px(p.x + off + side, y, col);
      px(p.x + off + side * 2, y, fr > 0.5 ? shades[1] : shades[0]);
      px(p.x + off + side * 2, y - 1, shades[0]);
    }
  }
  // luminous tip
  const tipOff = Math.round(Math.sin(t * 0.016 + p.ph + p.h * 0.2) * SWAY() * 3);
  px(p.x + tipOff, SAND_Y - p.h, night ? "#3dff8b" : "#8dffc0");
}

function drawGrass(p) {
  const shades = night ? KELP_NIGHT : KELP_DAY;
  for (const b of p.blades) {
    for (let i = 0; i < b.h; i++) {
      const y = SAND_Y - 1 - i;
      const off = Math.round(Math.sin(t * 0.024 + b.ph + i * 0.3) * SWAY() * (i / b.h) * 2.2);
      px(p.x + b.dx + off, y, i > b.h - 3 ? shades[2] : i > b.h / 2 ? shades[1] : shades[0]);
    }
  }
}

function drawBush(p) {
  const shades = night ? BUSH_NIGHT : BUSH_DAY;
  const off = Math.round(Math.sin(t * 0.012 + p.ph) * SWAY());
  for (const [dx, dy, ci] of p.pix) {
    const topHalf = dy < -p.ry;
    px(p.x + dx + (topHalf ? off : 0), SAND_Y - 1 + dy + p.ry, shades[ci]);
  }
}

function drawCoral(p) {
  const body = night ? "#8a3352" : "#c2436f";
  const tip = night ? "#c2436f" : "#ff6b9d";
  for (const [dx, dy, ci] of p.pix) px(p.x + dx, SAND_Y - 1 + dy, ci ? tip : body);
  for (const [dx, dy, ph] of p.polyps) {
    const on = Math.sin(t * 0.004 + ph) > 0.4;
    px(p.x + dx, SAND_Y - 1 + dy, on ? "#ffd6e6" : tip);
  }
}

function drawFiber(p) {
  const stem = night ? "#26364e" : "#1c2a3f";
  for (const s of p.strands) {
    let sx = p.x;
    for (let i = 0; i < s.len; i++) {
      const y = SAND_Y - 1 - i;
      const curve = s.spread * (i / s.len) * 4;
      const off = Math.sin(t * 0.014 + s.ph + i * 0.15) * SWAY() * (i / s.len) * 1.5;
      sx = p.x + Math.round(curve + off);
      px(sx, y, stem);
    }
    // glowing tip: pulses, brighter at night
    const gy = SAND_Y - 1 - s.len;
    const col = GLOW_CYCLE[(s.ci + Math.floor(t * 0.0008)) % GLOW_CYCLE.length];
    const pulse = Math.sin(t * 0.006 + s.ph) * 0.5 + 0.5;
    px(sx, gy, col);
    cx.globalAlpha = (night ? 0.5 : 0.25) * pulse;
    cx.fillStyle = col;
    cx.fillRect(sx - 1, gy, 1, 1); cx.fillRect(sx + 1, gy, 1, 1);
    cx.fillRect(sx, gy - 1, 1, 1); cx.fillRect(sx, gy + 1, 1, 1);
    cx.globalAlpha = 1;
  }
}

const PLANT_DRAW = { kelp: drawKelp, grass: drawGrass, bush: drawBush, coral: drawCoral, fiber: drawFiber };
function drawPlant(p) { PLANT_DRAW[p.type](p); }

function drawRocks() {
  const mounds = [[90, 7, "#3a4556"], [98, 5, "#2b3444"], [83, 4, "#46536a"]];
  for (const [mx, r, col] of mounds) {
    for (let hgt = 0; hgt <= r; hgt++) {
      const hw = Math.round(Math.sqrt(r * r - hgt * hgt) * 0.95);
      cx.fillStyle = col;
      cx.fillRect(mx - hw, SAND_Y - 1 - hgt, hw * 2 + 1, 1);
    }
  }
  // moss
  px(87, SAND_Y - 8, "#2fbf68"); px(90, SAND_Y - 9, "#17d96b"); px(93, SAND_Y - 8, "#22b35c");
  px(97, SAND_Y - 6, "#2fbf68"); px(100, SAND_Y - 5, "#22b35c"); px(82, SAND_Y - 5, "#17d96b");
}

function drawSprite(rows, cxr, cyr, dir, pal, opts) {
  const h = rows.length, w = rows[0].length;
  const ox = Math.round(cxr - w / 2), oy = Math.round(cyr - h / 2);
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      let ch = rows[r][c];
      if (ch === ".") continue;
      if (ch === "f" && opts && opts.squish && c < 1) continue;
      const drawC = dir === 1 ? c : w - 1 - c;
      let col;
      if (ch === "b") col = r === 0 || r === h - 1 ? pal.d : pal.b;
      else if (ch === "f") col = pal.f;
      else if (ch === "d") col = pal.d;
      else if (ch === "e") col = "#0a0e14";
      else if (ch === "w") col = "#e8f2fa";
      else if (ch === "c") col = "#46d8ff";
      px(ox + drawC, oy + r, col);
    }
  }
  return { ox, oy, w, h };
}

function drawFish(f) {
  // ~0.5s tail beat, phase-shifted per fish so the school doesn't flap in sync
  const fastFrame = Math.floor(t * (reduced ? 0.0015 : 0.003) + f.phase) % 2;
  const slowFrame = Math.floor(t * (reduced ? 0.0008 : 0.0015) + f.phase) % 2;
  let rows, opts = { squish: fastFrame === 1 };
  if (f.species === "jelly") { rows = JELLY_FRAMES[slowFrame]; opts = {}; }
  else if (f.species === "crab") { rows = CRAB_FRAMES[fastFrame]; opts = {}; }
  else if (f.species === "starfish") { rows = SPRITES.starfish; opts = {}; }
  else if (f.species === "seahorse") { rows = SPRITES.seahorse; }
  else if (f.species === "puffer" && f.inflated) { rows = SPRITES.pufferBig; opts = {}; }
  else if (f.species === "golden") { rows = SPRITES.guppy; }
  else { rows = SPRITES[f.species]; }
  const box = drawSprite(rows, f.x, f.y, f.dir, f.pal, opts);
  // senior fish crown
  if (f.ate >= 5) {
    cx.fillStyle = "#ffd54a";
    const hx = Math.round(f.x) + (f.dir === 1 ? 2 : -2);
    cx.fillRect(hx - 1, box.oy - 2, 3, 1);
    px(hx - 1, box.oy - 3, "#ffd54a"); px(hx + 1, box.oy - 3, "#ffd54a");
  }
  // golden sudo sparkle
  if (f.species === "golden" && Math.floor(t * 0.004) % 3 === 0) {
    px(f.x + rnd(-7, 7), f.y + rnd(-5, 5), Math.random() < 0.5 ? "#fff6c9" : "#ffd54a");
  }
}

function drawShark() {
  if (!shark) return;
  drawSprite(SHARK_SPRITE, shark.x, shark.y, shark.dir, SHARK_PAL, {});
}

function drawRaid() {
  if (!raid) return;
  if (raid.phase === "warn") {
    // distant fin silhouette glides past in the gloom
    const p = 1 - raid.timer / RAID_WARN_MS;
    const sx = -30 + p * (W + 60);
    cx.globalAlpha = 0.18;
    drawSprite(SHARK_SPRITE, sx, 17, 1, { b: "#0b1830", d: "#081226", f: "#081226" }, {});
    cx.globalAlpha = 1;
    return;
  }
  const b = raid.boss;
  const rows = SHARK_SPRITE, h = rows.length, w = rows[0].length, s = 2;
  const ox = Math.round(b.x - w), oy = Math.round(b.y - h);
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const ch = rows[r][c];
      if (ch === ".") continue;
      const dc = b.dir === 1 ? c : w - 1 - c;
      cx.fillStyle =
        ch === "b" ? "#4a5f74" :
        ch === "d" ? "#32424f" :
        ch === "w" ? "#e8f2fa" :
        (raidDark > 0.5 ? "#ff3b3b" : "#0a0e14"); // eye burns red in the dark
      cx.fillRect(ox + dc * s, oy + r * s, s, s);
    }
  }
  // wounds accumulate as the tank fights back
  cx.fillStyle = "#ff5c5c";
  for (let k = 0; k < BOSS_HP - b.hp && k < WOUND_SPOTS.length; k++) {
    const dc = b.dir === 1 ? WOUND_SPOTS[k][0] : w - 1 - WOUND_SPOTS[k][0];
    cx.fillRect(ox + dc * s, oy + WOUND_SPOTS[k][1] * s, s, s);
  }
}

function drawJailBack() {
  // cell interior shading
  cx.fillStyle = "rgba(8, 13, 24, 0.5)";
  cx.fillRect(JAIL.x, JAIL.top, JAIL.w, JAIL.h);
  for (let s = 0; s < 3; s++) {
    const fy = SAND_Y - 1 - s * 10; // this level's floor
    if (s > 0) { cx.fillStyle = "#2a3547"; cx.fillRect(JAIL.x + 1, fy + 1, JAIL.w - 2, 1); }
    // treadmill: rollers, animated belt, console post with a running light
    const bx = 6, bw = 14;
    const shift = Math.floor(t * 0.02) % 4;
    for (let i = 0; i < bw; i++) {
      cx.fillStyle = ((i + 4 - shift) % 4 < 2) ? "#4a5668" : "#2f3b4e";
      cx.fillRect(bx + i, fy - 1, 1, 1);
    }
    cx.fillStyle = "#141b29"; cx.fillRect(bx, fy, bw, 1);
    px(bx - 1, fy - 1, "#5a6a82"); px(bx + bw, fy - 1, "#5a6a82");
    cx.fillStyle = "#3a4556"; cx.fillRect(bx + bw + 2, fy - 5, 1, 5);
    px(bx + bw + 2, fy - 6, Math.floor(t * 0.01 + s) % 2 ? "#3dff8b" : "#14532d");
    // sentence progress above an occupied treadmill
    const pf = JAIL.slots[s];
    if (pf && pf.jail) {
      const frac = Math.max(0, Math.min(1, 1 - pf.jail.sentence / pf.jail.total));
      cx.fillStyle = "#1c2433"; cx.fillRect(bx + 2, fy - 9, 10, 1);
      cx.fillStyle = "#3dff8b"; cx.fillRect(bx + 2, fy - 9, Math.round(10 * frac), 1);
    }
  }
}

function drawJailFront() {
  // roof and right-side frame
  cx.fillStyle = "#3a4556";
  cx.fillRect(JAIL.x, JAIL.top - 1, JAIL.w + 1, 1);
  cx.fillRect(JAIL.right, JAIL.top - 1, 1, JAIL.h + 1);
  // vertical bars over the cell
  cx.fillStyle = "#46536a";
  for (let bx = JAIL.x + 2; bx < JAIL.right; bx += 4) {
    cx.fillRect(bx, JAIL.top, 1, JAIL.h);
  }
}

// pixel gold coin: black outline, gold rim, orange face, S mark, top-left shine
const COIN_ROWS = [
  ".ooooo.",
  "ohhyyyo",
  "oyyddbo",
  "oyydbbo",
  "oyddbbo",
  "oybbbbo",
  ".ooooo.",
];
const COIN_COLORS = { o: "#1a1208", h: "#ffe89a", y: "#ffc93c", b: "#f0930f", d: "#8a5a10" };
function drawCoins() {
  for (const c of coins) {
    const phc = Math.floor(t * 0.005 + c.x * 0.7) % 4;
    const scale = phc === 0 ? 1 : phc === 2 ? 0.35 : 0.7; // spins as it falls
    for (let r = 0; r < 7; r++) {
      for (let col = 0; col < 7; col++) {
        const ch = COIN_ROWS[r][col];
        if (ch === ".") continue;
        px(c.x + Math.round((col - 3) * scale), c.y + r - 3, COIN_COLORS[ch]);
      }
    }
  }
}

function drawChest() {
  const X = CHEST.x, Y = CHEST.y, open = CHEST.openT > 0;
  // base
  cx.fillStyle = "#6b4a2a"; cx.fillRect(X, Y + 3, 13, 6);
  cx.fillStyle = "#4a3018"; cx.fillRect(X, Y + 8, 13, 1); cx.fillRect(X + 6, Y + 3, 1, 6);
  cx.fillStyle = "#8a6236"; cx.fillRect(X, Y + 3, 13, 1);
  // lid
  if (open) {
    cx.fillStyle = "#6b4a2a"; cx.fillRect(X - 1, Y - 3, 13, 2);
    cx.fillStyle = "#8a6236"; cx.fillRect(X - 1, Y - 4, 13, 1);
    // glow from inside
    cx.fillStyle = Math.floor(t * 0.003) % 2 ? "#ffd54a" : "#ffe89a";
    cx.fillRect(X + 2, Y + 2, 9, 1);
  } else {
    cx.fillStyle = "#6b4a2a"; cx.fillRect(X, Y, 13, 3);
    cx.fillStyle = "#8a6236"; cx.fillRect(X, Y, 13, 1);
    cx.fillStyle = "#c79a1e"; cx.fillRect(X + 5, Y + 2, 3, 3); // lock
    px(X + 6, Y + 3, "#4a3018");
  }
}

// ---------- update ----------
function dropFood(f) {
  if (f.food && f.food.life > 0) f.food.claims--;
  f.food = null;
}

function eat(f, fl) {
  fl.life = 0;
  f.ate++;
  if (f.ate >= LOVE_AT) hearts.push({ x: f.x, y: f.y - 5, life: 1100 });
  if (f.ate === 5) log(`${f.name}[${f.pid}] promoted to senior fish 👑`, "ok");
  else log(`${f.name}[${f.pid}] ate flake · exit 0`, "ok");
  f.food = null;
  f.retarget = 0;
}

function update(dt) {
  t += dt;
  const nightMul = night ? 0.5 : 1;

  // raid state machine
  if (!raid) {
    raidTimer -= dt;
    if (raidTimer <= 0 && fishes.length >= 8 && !shark) startRaid();
  } else if (raid.phase === "warn") {
    raid.timer -= dt;
    if (raid.timer <= 0) {
      const dir = Math.random() < 0.5 ? 1 : -1;
      raid.boss = {
        x: dir === 1 ? -30 : W + 30, y: 45, ty: rnd(32, 64), dir,
        hp: BOSS_HP, passes: 0, stun: 0, kvx: 0,
        hitCd: 0, mcd: 2000, jcd: 0, scd: 2500, bitCd: 1000,
      };
      raid.phase = "fight";
    }
  } else if (raid.phase === "fight") {
    raid.rallyCd -= dt;
    raid.retreat -= dt;
    updateBoss(dt);
  } else if (raid.phase === "flee") {
    const b = raid.boss;
    b.x += b.dir * 1.8 * dt * 0.06;
    if (b.x < -45 || b.x > W + 45) {
      raid = null;
      raidTimer = rnd(140000, 280000);
    }
  }
  raidDark += (((raid && raid.phase !== "flee") ? 1 : 0) - raidDark) * 0.0012 * dt;
  const threat = raid && raid.phase === "fight" ? raid.boss : shark;
  const fleeR = raid && raid.phase === "fight" ? 26 : 75;

  // shark event (paused during raids)
  if (!raid) sharkTimer -= dt;
  if (!raid && !shark && sharkTimer <= 0) { summonShark(); }
  if (shark) {
    shark.x += shark.dir * (reduced ? 0.4 : 0.75) * dt * 0.06;
    shark.y += Math.sin(t * 0.005) * 0.03 * dt * 0.06;
    // first fish caught in the mouth gets eaten (one per visit)
    if (!shark.fed) {
      const mx = shark.x + shark.dir * 9;
      for (let i = 0; i < fishes.length; i++) {
        const f = fishes[i];
        if (SAND_DWELLERS.includes(f.species) || f.species === "jelly" || f.jail || f.dragged) continue;
        if (f.inflated) continue; // spikes: inflated puffer is inedible
        if (Math.abs(f.x - mx) < 7 && Math.abs(f.y - shark.y) < 5) {
          dropFood(f);
          fishes.splice(i, 1);
          shark.fed = true;
          for (let k = 0; k < 10; k++) {
            bubbles.push({ x: f.x + rnd(-4, 4), y: f.y + rnd(-3, 3), r: Math.random() < 0.5 ? 1 : 2, ph: rnd(0, 6) });
          }
          if (nonCrabCount() < MIN_FISH) {
            setTimeout(() => {
              if (nonCrabCount() >= MIN_FISH) return;
              let nf; do { nf = makeFish(); } while (nf.species === "crab");
              addFish(nf);
            }, 8000);
          }
          break;
        }
      }
    }
    if (shark.x < -35 || shark.x > W + 35) {
      shark = null;
      sharkTimer = rnd(60000, 150000);
    }
  }

  // mantis shrimp guards the chest: punches anything that swims too close
  // (during a raid fight it saves its punches for the boss)
  MANTIS.cool -= dt;
  if (MANTIS.show > 0) MANTIS.show -= dt;
  if (MANTIS.cool <= 0 && (!raid || raid.phase === "warn")) {
    for (const f of fishes) {
      if (SAND_DWELLERS.includes(f.species) || f.knock > 0 || f.jail || f.dragged) continue;
      if (Math.abs(f.x - (CHEST.x + 6)) < 13 && f.y > CHEST.y - 15) {
        MANTIS.dir = f.x >= CHEST.x + 6 ? 1 : -1;
        MANTIS.cool = 5000;
        MANTIS.show = 1000;
        CHEST.openT = Math.max(CHEST.openT, 1000);
        const power = rnd(2.8, 3.8);
        const ang = rnd(-2.2, -0.9); // launch upward-ish
        f.knock = 3200;
        f.kvx = Math.cos(ang) * power * MANTIS.dir;
        f.kvy = Math.sin(ang) * power;
        dropFood(f);
        f.inflated = f.species === "puffer"; // puffer panics
        for (let k = 0; k < 6; k++) {
          bubbles.push({ x: f.x + rnd(-2, 2), y: f.y + rnd(-2, 2), r: 1, ph: rnd(0, 6) });
        }
        break;
      }
    }
  }

  // breeding: a close same-species pair lays 1-2 eggs
  breedT -= dt;
  if (breedT <= 0) {
    breedT = rnd(25000, 50000);
    if (!raid && eggs.length === 0 && fishes.length < CAP - 1) {
      outer:
      for (let i = 0; i < fishes.length; i++) {
        for (let j = i + 1; j < fishes.length; j++) {
          const a = fishes[i], b = fishes[j];
          if (a.species !== b.species) continue;
          if (SAND_DWELLERS.includes(a.species) || a.species === "jelly") continue;
          if (a.jail || b.jail || a.dragged || b.dragged) continue;
          if (Math.hypot(a.x - b.x, a.y - b.y) < 24) {
            const n = ri(1, 2);
            for (let k = 0; k < n; k++) {
              const par = Math.random() < 0.5 ? a : b;
              eggs.push({
                x: (a.x + b.x) / 2 + rnd(-4, 4),
                y: (a.y + b.y) / 2,
                hatch: rnd(22000, 38000),
                species: a.species,
                pal: par.pal, palIdx: par.palIdx,
              });
            }
            break outer;
          }
        }
      }
    }
  }
  // eggs sink to the sand, then hatch
  for (let i = eggs.length - 1; i >= 0; i--) {
    const e = eggs[i];
    if (e.y < SAND_Y - 3) e.y += 0.04 * dt * 0.06;
    e.hatch -= dt;
    if (e.hatch <= 0) {
      eggs.splice(i, 1);
      if (fishes.length < CAP) {
        const baby = makeFish(e.species);
        baby.x = e.x; baby.y = Math.min(e.y, SAND_Y - 12); baby.pal = e.pal;
        if (e.palIdx != null) baby.palIdx = e.palIdx;
        if (e.species === "crab" || e.species === "starfish") baby.y = SAND_Y - 4;
        addFish(baby);
        for (let k = 0; k < 4; k++) bubbles.push({ x: e.x + rnd(-2, 2), y: e.y, r: 1, ph: rnd(0, 6) });
      }
    }
  }

  // occasional drifter wanders in
  driftT -= dt;
  if (driftT <= 0) {
    driftT = rnd(90000, 180000);
    if (!raid && fishes.length < 12) addFish(makeFish());
  }

  // fish
  for (const f of fishes) {
    f.retarget -= dt;

    // doing time: swim the treadmill until the sentence is served
    if (f.jail) {
      f.jail.sentence -= dt;
      const floorY = SAND_Y - 1 - f.jail.slot * 10;
      f.dir = 1;
      f.x = 13 + Math.sin(t * 0.02 + f.phase) * 0.6;
      f.y = floorY - 4 + Math.sin(t * 0.018 + f.phase) * 0.5;
      f.vx = 0;
      if (Math.random() < 0.0012 * dt) bubbles.push({ x: f.x + 4, y: f.y - 3, r: 1, ph: rnd(0, 6) }); // effort bubbles
      // catches meals dropped into the cell as they fall past
      for (const fl of flakes) {
        if (fl.life <= 0) continue;
        if (Math.abs(fl.x - f.x) < 6 && Math.abs(fl.y - f.y) < 6) { eat(f, fl); break; }
      }
      if (f.jail.sentence <= 0) {
        JAIL.slots[f.jail.slot] = null;
        f.jail = null;
        f.knock = 700; f.kvx = 1.6; f.kvy = -0.5; // bursts out through the door
        hearts.push({ x: JAIL.right + 4, y: floorY - 8, life: 1000 });
        for (let k = 0; k < 5; k++) bubbles.push({ x: JAIL.right + 2, y: floorY - 4, r: 1, ph: rnd(0, 6) });
      }
      continue;
    }
    if (f.dragged) continue;

    // mantis-punched: ragdoll bouncing off the glass until it recovers
    if (f.knock > 0) {
      f.knock -= dt;
      f.x += f.kvx * dt * 0.06;
      f.y += f.kvy * dt * 0.06;
      if (f.x < 9) { f.x = 9; f.kvx = Math.abs(f.kvx) * 0.92; }
      if (f.x > W - 9) { f.x = W - 9; f.kvx = -Math.abs(f.kvx) * 0.92; }
      if (f.y < 8) { f.y = 8; f.kvy = Math.abs(f.kvy) * 0.92; }
      if (f.y > SAND_Y - 7) { f.y = SAND_Y - 7; f.kvy = -Math.abs(f.kvy) * 0.92; }
      const drag = 1 - 0.0005 * dt;
      f.kvx *= drag; f.kvy *= drag;
      f.dir = f.kvx >= 0 ? 1 : -1; // tumbles with each wall hit
      if (f.knock <= 0) { f.vx = 0; f.retarget = 0; }
      continue;
    }

    if (f.species === "starfish") {
      // barely crawls along the sand
      f.y = SAND_Y - 3;
      if (f.retarget <= 0) { f.retarget = rnd(6000, 14000); if (Math.random() < 0.5) f.dir *= -1; }
      f.x += f.dir * f.speed * nightMul * dt * 0.06;
      if (f.x < 8) { f.x = 8; f.dir = 1; }
      if (f.x > W - 8) { f.x = W - 8; f.dir = -1; }
      continue;
    }

    if (f.species === "seahorse") {
      // upright bobbing, drifts between plants
      if (f.retarget <= 0) {
        f.retarget = rnd(5000, 11000);
        f.targetY = rnd(24, SAND_Y - 18);
        f.tx = rnd(14, W - 14);
      }
      f.x += (f.tx - f.x) * 0.00025 * dt * nightMul;
      f.dir = f.tx > f.x ? 1 : -1;
      f.y += ((f.targetY - f.y) * 0.0006 + Math.sin(t * 0.003 + f.phase) * 0.012) * dt * 0.6 * nightMul;
      f.y = Math.max(14, Math.min(SAND_Y - 12, f.y));
      f.x = Math.max(10, Math.min(W - 10, f.x));
      continue;
    }

    if (f.species === "crab") {
      // ferris walks the sand, eats flakes that land nearby
      f.y = SAND_Y - 4;
      if (f.retarget <= 0) {
        f.retarget = rnd(2500, 7000);
        if (Math.random() < 0.5) f.dir *= -1;
        if (Math.random() < 0.3) f.scurry = rnd(600, 1200); // sudden crab dash
      }
      if (f.scurry > 0) f.scurry -= dt;
      let snack = null;
      for (const fl of flakes) {
        if (fl.y > SAND_Y - 8 && Math.abs(fl.x - f.x) < 40) { snack = fl; break; }
      }
      if (snack) {
        f.dir = snack.x > f.x ? 1 : -1;
        if (Math.abs(snack.x - f.x) < 5) eat(f, snack);
      }
      f.x += f.dir * f.speed * (f.scurry > 0 ? 2.8 : 1) * nightMul * dt * 0.06;
      if (f.x < 10) { f.x = 10; f.dir = 1; }
      if (f.x > W - 10) { f.x = W - 10; f.dir = -1; }
      continue;
    }

    if (f.species === "jelly") {
      // jellyfin drifts and pulses, ignores food and sharks
      f.y += (Math.sin(t * 0.0015 + f.phase) * 0.06 - 0.005) * dt * 0.06 * nightMul;
      f.x += Math.sin(t * 0.0008 + f.phase * 2) * 0.04 * dt * 0.06 * nightMul;
      f.y = Math.max(12, Math.min(SAND_Y - 14, f.y));
      f.x = Math.max(10, Math.min(W - 10, f.x));
      continue;
    }

    // raid omen: swimmers sink toward cover among the plants
    if (raid && raid.phase === "warn") f.targetY = Math.max(f.targetY, SAND_Y - 26);

    // puffer inflation: scheduled hiccups + threat proximity
    if (f.species === "puffer") {
      f.puffT -= dt;
      const sharkNear = threat && Math.abs(threat.x - f.x) < 55;
      const wasInflated = f.inflated;
      f.inflated = sharkNear || f.puffT < 3000;
      if (f.puffT < 0) f.puffT = rnd(12000, 26000);
      if (f.inflated && !wasInflated) log(`${f.name}[${f.pid}] inflated — stack overflow`, "warn");
    }

    // raid combat: the whole school mobs the boss in hit-and-run waves
    if (raid && raid.phase === "fight" && !f.inflated) {
      const b = raid.boss;
      f.aggroT -= dt;
      if (f.aggroT <= 0) {
        f.aggroT = rnd(1000, 2400);
        f.aggro = Math.random() < 0.7; // most of the tank fights, a few catch their breath
        f.aggroY = rnd(-9, 9);
      }
      if (raid.retreat > 0) f.aggro = false; // scatter command overrides
      dropFood(f);
      if (f.aggro) {
        // dart at the boss flank
        f.dir = f.x < b.x ? 1 : -1;
        f.targetY = b.y + f.aggroY;
      } else {
        // peel off before circling back
        f.dir = f.x < b.x ? -1 : 1;
        f.targetY = f.y < 50 ? 18 : SAND_Y - 16;
      }
    }
    // flee threat (regular shark passes)
    else if (threat && Math.abs(threat.x - f.x) < fleeR && !f.inflated) {
      f.dir = f.x < threat.x ? -1 : 1;
      f.targetY = f.y < threat.y ? 16 : SAND_Y - 14;
      dropFood(f);
    } else {
      if (f.foodCd > 0) f.foodCd -= dt;
      // lost interest: flake gone, or it landed (bottom crumbs are the crab's job)
      if (f.food && (f.food.life <= 0 || f.food.grounded)) {
        dropFood(f);
        f.foodCd = rnd(1500, 3000);
      }
      // probabilistic interest: hungry fish react sooner, and a flake
      // only gets chased by the 1-2 fish that claimed it first
      if (!raid && !f.food && f.foodCd <= 0 && Math.random() < 0.004 * (f.ate < LOVE_AT ? 1 : 0.4) * dt) {
        let bd = 70, pick = null;
        for (const fl of flakes) {
          if (fl.grounded || fl.claims >= fl.maxClaims) continue;
          const d = Math.hypot(fl.x - f.x, fl.y - f.y);
          if (d < bd) { bd = d; pick = fl; }
        }
        if (pick) { f.food = pick; pick.claims++; }
      }
      if (f.food) {
        f.dir = f.food.x > f.x ? 1 : -1;
        f.targetY = f.food.y;
        if (Math.abs(f.food.x - f.x) < 5 && Math.abs(f.food.y - f.y) < 8) eat(f, f.food);
      } else if (f.retarget <= 0) {
        f.retarget = rnd(2000, 6000);
        f.targetY = rnd(14, SAND_Y - 26);
        if (Math.random() < 0.35) f.dir *= -1;
      }
    }

    let sp = f.food ? f.speed * 1.9 : f.speed;
    const inCombat = raid && raid.phase === "fight";
    const excited = f.food || inCombat || (threat && Math.abs(threat.x - f.x) < fleeR);
    if (threat && Math.abs(threat.x - f.x) < fleeR) sp = f.speed * 2.6;
    if (inCombat && f.aggro) sp = f.speed * 2.2;
    if (f.inflated) sp = f.speed * 0.3;
    sp *= nightMul;
    // burst-and-glide: tail-beat kicks accelerate the fish, then it coasts
    f.burstT -= dt;
    if (f.burstT <= 0) {
      f.burstT = (excited ? rnd(300, 800) : rnd(1000, 3000)) * (f.species === "whale" ? 2 : 1);
      f.thrust = rnd(1.3, 2.1);
    }
    f.thrust = Math.max(0.3, f.thrust - 0.0006 * dt);
    f.vx += (f.dir * sp * f.thrust - f.vx) * 0.04 * dt * 0.06;
    f.x += f.vx * dt * 0.06;
    f.y += ((f.targetY - f.y) * 0.0009 + Math.sin(t * 0.004 + f.phase) * 0.004) * dt * 0.6;
    if (f.x < 12) { f.x = 12; f.dir = 1; }
    if (f.x > W - 12) { f.x = W - 12; f.dir = -1; }
    f.y = Math.max(10, Math.min(SAND_Y - 8, f.y));
  }

  // free fish keep clear of the jail block
  for (const f of fishes) {
    if (f.jail || f.dragged) continue;
    if (f.y > JAIL.top - 6 && f.x < JAIL.right + 5) {
      f.x = JAIL.right + 5;
      if (f.knock > 0) f.kvx = Math.abs(f.kvx);
      else f.dir = 1;
    }
  }

  // separation: overlapping swimmers gently push apart (crabs stay on sand)
  for (let i = 0; i < fishes.length; i++) {
    const a = fishes[i];
    if (SAND_DWELLERS.includes(a.species) || a.knock > 0 || a.jail || a.dragged) continue;
    for (let j = i + 1; j < fishes.length; j++) {
      const b = fishes[j];
      if (SAND_DWELLERS.includes(b.species) || b.knock > 0 || b.jail || b.dragged) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      if (Math.abs(dx) < 11 && Math.abs(dy) < 7) {
        const push = 0.06 * dt * 0.06;
        const sy = dy >= 0 ? 1 : -1;
        const sx = dx >= 0 ? 1 : -1;
        a.y = Math.max(10, Math.min(SAND_Y - 8, a.y - sy * push));
        b.y = Math.max(10, Math.min(SAND_Y - 8, b.y + sy * push));
        a.x = Math.max(10, Math.min(W - 10, a.x - sx * push * 0.6));
        b.x = Math.max(10, Math.min(W - 10, b.x + sx * push * 0.6));
      }
    }
  }

  // command ripple rings expand and fade
  for (let i = rings.length - 1; i >= 0; i--) {
    const rg = rings[i];
    rg.r += 0.06 * dt;
    rg.life -= dt;
    if (rg.life <= 0) rings.splice(i, 1);
  }

  // hearts drift up and fade
  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    h.y -= 0.1 * dt * 0.06;
    h.life -= dt;
    if (h.life <= 0) hearts.splice(i, 1);
  }
  // a loved fish occasionally shows affection on its own
  if (Math.random() < 0.0002 * dt) {
    const loved = fishes.filter(f => f.ate >= LOVE_AT);
    if (loved.length) {
      const f = loved[ri(0, loved.length - 1)];
      hearts.push({ x: f.x, y: f.y - 5, life: 1100 });
    }
  }

  // chest + coins
  if (CHEST.openT > 0) CHEST.openT -= dt;
  if (CHEST.cooldown > 0) CHEST.cooldown -= dt;
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.y += c.vy * dt * 0.06;
    c.vy += 0.004 * dt * 0.06;
    c.life -= dt;
    if (c.life <= 0 || c.y > SAND_Y - 1) {
      coins.splice(i, 1);
      if (!c.ghost) addGold(1); // every coin lands in the wallet
    }
  }
  // bubbles
  if (Math.random() < 0.03 * dt * 0.06) {
    bubbles.push({ x: rnd(4, W - 4), y: SAND_Y - 2, r: Math.random() < 0.7 ? 1 : 2, ph: rnd(0, 6) });
  }
  if (Math.random() < 0.02 * dt * 0.06) {
    bubbles.push({ x: 93 + rnd(-2, 2), y: SAND_Y - 9, r: 1, ph: rnd(0, 6) });
  }
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y -= (reduced ? 0.1 : 0.22) * dt * 0.06;
    b.x += Math.sin(t * 0.01 + b.ph) * 0.05 * dt * 0.06;
    if (b.y < 2) bubbles.splice(i, 1);
  }
  // flakes
  for (let i = flakes.length - 1; i >= 0; i--) {
    const fl = flakes[i];
    fl.life -= dt * 0.06;
    if (fl.y < SAND_Y - 4) {
      fl.y += fl.vy * dt * 0.06;
    } else if (!fl.grounded) {
      fl.grounded = true;
      fl.life = Math.min(fl.life, 210); // landed crumbs fade in ~8s
    }
    fl.x += Math.sin(t * 0.008 + fl.y) * 0.02 * dt * 0.06;
    if (fl.life <= 0) flakes.splice(i, 1);
  }
}

// ---------- render ----------
function render() {
  drawWater();
  for (const p of plants) if (!p.front) drawPlant(p);
  drawRocks();
  drawSand();
  drawDecos();
  drawJailBack();
  drawChest();
  if (MANTIS.show > 0) {
    drawSprite(MANTIS_SPRITE, CHEST.x + 6 + MANTIS.dir * 4, CHEST.y - 5, MANTIS.dir, MANTIS_PAL, {});
  }
  for (const e of eggs) {
    px(e.x, e.y, "#ffe9c9"); px(e.x + 1, e.y, "#ffe9c9");
    px(e.x, e.y + 1, "#d9b98a"); px(e.x + 1, e.y + 1, "#d9b98a");
  }
  for (const fl of flakes) px(fl.x, fl.y, Math.floor(t * 0.002 + fl.x) % 2 ? "#ffd27a" : "#e8a94e");
  drawCoins();
  for (const f of fishes) drawFish(f);
  drawShark();
  for (const h of hearts) {
    const c = h.life > 400 ? "#ff6b9d" : "#c23f6e";
    const hx = Math.round(h.x), hy = Math.round(h.y);
    px(hx - 1, hy - 1, c); px(hx + 1, hy - 1, c);
    px(hx - 1, hy, c); px(hx, hy, c); px(hx + 1, hy, c);
    px(hx, hy + 1, c);
  }
  cx.fillStyle = "rgba(190,230,255,0.8)";
  for (const b of bubbles) {
    if (b.r === 1) { cx.fillRect(b.x | 0, b.y | 0, 1, 1); }
    else {
      cx.fillRect((b.x | 0), (b.y | 0) - 1, 1, 1); cx.fillRect((b.x | 0), (b.y | 0) + 1, 1, 1);
      cx.fillRect((b.x | 0) - 1, b.y | 0, 1, 1); cx.fillRect((b.x | 0) + 1, b.y | 0, 1, 1);
    }
  }
  for (const p of plants) if (p.front) drawPlant(p);
  drawJailFront();
  // raid gloom settles over the whole tank, boss stays vivid on top
  if (raidDark > 0.01) {
    cx.fillStyle = `rgba(3, 9, 20, ${(raidDark * 0.42).toFixed(3)})`;
    cx.fillRect(0, 0, W, H);
  }
  drawRaid();
  for (const rg of rings) {
    cx.globalAlpha = Math.max(0, rg.life / 600) * 0.8;
    cx.fillStyle = rg.col;
    for (let a = 0; a < 20; a++) {
      const ang = a / 20 * Math.PI * 2;
      cx.fillRect(Math.round(rg.x + Math.cos(ang) * rg.r), Math.round(rg.y + Math.sin(ang) * rg.r), 1, 1);
    }
    cx.globalAlpha = 1;
  }
}

// ---------- loop ----------
let lastT = performance.now();

function loop(now) {
  const rawDt = Math.min(50, Math.max(0, now - lastT));
  // global pace: simulation runs at 45% speed for a calm, ornamental feel
  const dt = rawDt * 0.45;
  lastT = now;
  update(dt);
  render();
  updateNameTags();
  requestAnimationFrame(loop);
}

// ---------- boot ----------
document.getElementById("wallet").prepend(coinImg(15));
renderGold();
renderShop();
renderDex();
if (save.frame && (save.frames.includes(save.frame) || save.frame === "")) applyFrame(save.frame);
// restore the saved tank; fall back to a fresh one
let restored = false;
if (Array.isArray(save.fish) && save.fish.length) {
  for (const sf of save.fish) {
    if (fishes.length >= CAP) break;
    if (!SPECIES_DEF.some(d => d.key === sf.s)) continue;
    const f = makeFish(sf.s);
    if (sf.p >= 0 && FISH_PALETTES[sf.p]) { f.palIdx = sf.p; f.pal = FISH_PALETTES[sf.p]; }
    if (sf.n) f.name = sf.n;
    if (sf.c) f.customName = sf.c;
    f.ate = sf.a || 0;
    if (typeof sf.x === "number") f.x = Math.max(4, Math.min(W - 4, sf.x));
    if (typeof sf.y === "number" && !SAND_DWELLERS.includes(sf.s)) {
      f.y = Math.max(10, Math.min(SAND_Y - 8, sf.y));
    }
    addFish(f);
    restored = true;
  }
  for (const se of save.eggs || []) {
    if (fishes.length + eggs.length >= CAP) break;
    const def = SPECIES_DEF.find(d => d.key === se.s);
    if (!def) continue;
    const pal = se.p >= 0 && FISH_PALETTES[se.p] ? FISH_PALETTES[se.p] : (def.pal || FISH_PALETTES[0]);
    eggs.push({
      x: typeof se.x === "number" ? se.x : rnd(40, 140),
      y: typeof se.y === "number" ? se.y : 8,
      hatch: Math.max(3000, se.h || 15000),
      species: se.s, pal, palIdx: se.p,
    });
  }
}
if (!restored) {
  addFish(makeFish("crab"));   // ferris always ships
  addFish(makeFish("jelly"));
  addFish(makeFish("puffer"));
  while (nonCrabCount() < MIN_FISH + 1) {
    let nf; do { nf = makeFish(); } while (nf.species === "crab");
    addFish(nf);
  }
}
persistNow();
log("initializing tank driver… ok");
log("water pump daemon started (pid 42)", "ok");
log(`${fishes.length} fish processes attached`, "ok");
requestAnimationFrame(loop);

})();
</script>
